<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VEDA — Sacred Tarot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Cinzel:wght@400;500;600&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & VARIABLES ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-main: #FAF9F6;        
  --bg-card: #FFFFFF;        
  --text-main: #2C2A28;      
  --text-muted: #6B655C;     
  --gold: #A87C3E;           
  --gold-light: #DFCDA1;     
  --gold-bg: #F8F4EC;        
  --border: #E6E2D8;         
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg-main);
  color: var(--text-main);
  font-family: 'Raleway', sans-serif;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}

/* ─── BACKGROUND TEXTURES ─── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; opacity: 0.6;
}
.grain {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  mix-blend-mode: multiply; opacity: 0.4;
}

/* ─── PROFILE CONTAINER ─── */
.profile-container {
  position: relative; z-index: 2;
  max-width: 480px; 
  margin: 0 auto;
  padding: 40px 20px 60px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

/* ─── HEADER ─── */
.header { text-align: center; }
.avatar {
  width: 96px; height: 96px; margin: 0 auto 16px;
  background: var(--bg-card); border: 2px solid var(--gold-light);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 40px; box-shadow: 0 8px 24px rgba(168, 124, 62, 0.15);
}
.name {
  font-family: 'Cinzel', serif; font-size: 24px; font-weight: 600;
  color: var(--gold); letter-spacing: 4px; margin-bottom: 6px;
}
.bio {
  font-family: 'Playfair Display', serif; font-size: 16px;
  color: var(--text-muted); font-style: italic; margin-bottom: 16px;
}

/* ─── PRODUCTS GRID ─── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (max-width: 360px) {
  .products-grid { grid-template-columns: 1fr; }
}

.product-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  transition: transform 0.2s, box-shadow 0.2s;
}
.product-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.06);
}

.product-img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-bottom: 1px solid var(--border);
}

.product-info {
  padding: 12px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.product-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-main);
  line-height: 1.3;
  margin-bottom: 4px;
}

.product-link {
  font-size: 12px;
  color: #1A73E8; 
  text-decoration: underline;
  margin-bottom: 8px;
  cursor: pointer;
}

.product-price {
  font-size: 16px;
  font-weight: 700;
  color: #000;
  margin-bottom: 16px;
}

.btn-book {
  margin-top: auto;
  width: 100%;
  background: var(--gold);
  border: none;
  border-radius: 4px;
  padding: 10px 8px;
  font-family: 'Raleway', sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #FFF;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-book:hover { background: #8C6630; }
.btn-book svg { width: 14px; height: 14px; fill: currentColor; }

/* ─── MODAL (POP-UP) ─── */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; visibility: hidden;
  transition: all 0.3s ease;
}
.modal-overlay.active {
  opacity: 1; visibility: visible;
}
.modal-content {
  background: var(--bg-card);
  width: 90%; max-width: 400px;
  border-radius: 16px; padding: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  position: relative;
  transform: translateY(20px);
  transition: all 0.3s ease;
}
.modal-overlay.active .modal-content {
  transform: translateY(0);
}
.close-btn {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none;
  font-size: 28px; color: var(--text-muted);
  cursor: pointer; line-height: 1;
}
.close-btn:hover { color: var(--text-main); }

.booking-title {
  font-family: 'Cinzel', serif; font-size: 18px; font-weight: 600;
  color: var(--gold); text-align: center; margin-bottom: 20px; letter-spacing: 1px;
}

.field { margin-bottom: 16px; }
label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
input, select, textarea {
  width: 100%; padding: 12px 14px;
  background: var(--bg-main); border: 1px solid var(--border);
  border-radius: 8px; font-family: 'Raleway', sans-serif;
  font-size: 14px; color: var(--text-main);
  transition: all 0.3s; appearance: none;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); background: #FFF; }
textarea { resize: vertical; min-height: 80px; }

.btn-submit {
  width: 100%; padding: 14px;
  background: var(--gold); color: #FFF;
  border: none; border-radius: 8px;
  font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: 0.3s; margin-top: 8px;
}
.btn-submit:hover { background: #8C6630; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(168,124,62,0.25); }

/* Success Screen inside Modal */
.success-screen {
  text-align: center; padding: 20px 0 10px;
}
.success-icon { font-size: 50px; margin-bottom: 16px; }
.success-title { font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold); margin-bottom: 8px; }
.success-text { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }

/* ─── FOOTER ─── */
.footer { text-align: center; font-size: 11px; color: var(--text-muted); padding-top: 20px; border-top: 1px solid var(--border); margin-top: 20px; }
</style>
</head>
<body>

<div class="grain"></div>
<canvas id="bg-canvas"></canvas>

<main class="profile-container">
  
  <!-- HEADER -->
  <header class="header">
    <div class="avatar">🌙</div>
    <h1 class="name">VEDA</h1>
    <p class="bio">Seek the Truth. Let the Cards Guide You.</p>
  </header>

  <!-- PRODUCTS GRID -->
  <section class="products-grid">
    
    <!-- Product 1 -->
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1636246441746-816a4eee4a50?auto=format&fit=crop&w=400&q=80" alt="Tarot Cards Reading" class="product-img">
      <div class="product-info">
        <h3 class="product-title">Tarot card reading session (30 min)</h3>
        <span class="product-link" onclick="openModal('30min')">View details</span>
        <div class="product-price">₹ 3999</div>
        <button class="btn-book" onclick="openModal('30min')">
          <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/></svg>
          Book Session
        </button>
      </div>
    </div>

    <!-- Product 2 -->
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1617331140180-e8262094733a?auto=format&fit=crop&w=400&q=80" alt="Tarot Session with Crystals" class="product-img">
      <div class="product-info">
        <h3 class="product-title">Tarot card reading session (60 min)</h3>
        <span class="product-link" onclick="openModal('60min')">View details</span>
        <div class="product-price">₹ 7777</div>
        <button class="btn-book" onclick="openModal('60min')">
          <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/></svg>
          Book Session
        </button>
      </div>
    </div>

    <!-- Product 3 -->
    <div class="product-card">
      <img src="https://images.unsplash.com/photo-1544027993-37db244df7d7?auto=format&fit=crop&w=400&q=80" alt="Astrology and Tarot" class="product-img">
      <div class="product-info">
        <h3 class="product-title">Tarot card reading session (2 hour)</h3>
        <span class="product-link" onclick="openModal('2hr')">View details</span>
        <div class="product-price">₹ 13333</div>
        <button class="btn-book" onclick="openModal('2hr')">
          <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/></svg>
          Book Session
        </button>
      </div>
    </div>

  </section>

  <footer class="footer">
    &copy; 2024 VEDA Tarot. Sacred guidance.
  </footer>

</main>

<!-- BOOKING MODAL (POP-UP) -->
<div class="modal-overlay" id="bookingModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    
    <!-- Dynamic Body (Swaps from Form to Success Message) -->
    <div id="modalBody">
      <h2 class="booking-title">Reserve Your Reading</h2>
      
      <form onsubmit="handleBooking(event)">
        <div class="field">
          <label>Selected Session</label>
          <select id="readingDropdown" required>
            <option value="30min">Reading Session (30 min) - ₹3999</option>
            <option value="60min">Reading Session (60 min) - ₹7777</option>
            <option value="2hr">Reading Session (2 hour) - ₹13333</option>
          </select>
        </div>

        <div class="field">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="field">
          <label>WhatsApp Number</label>
          <input type="tel" placeholder="+91 00000 00000" required>
        </div>

        <div class="field">
          <label>Intention / Focus</label>
          <textarea placeholder="What would you like the cards to illuminate?..." required></textarea>
        </div>

        <button type="submit" class="btn-submit">Confirm Booking</button>
      </form>
    </div>

  </div>
</div>

<script>
  // Soft gold background particles
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() { 
    W = canvas.width = window.innerWidth; 
    H = canvas.height = window.innerHeight; 
  }
  window.addEventListener('resize', resize);
  resize();

  function Particle() {
    this.x = Math.random() * W; 
    this.y = Math.random() * H;
    this.r = Math.random() * 1.5 + 0.5;
    this.speed = Math.random() * 0.2 + 0.05;
    this.angle = Math.random() * Math.PI * 2;
    this.opacity = Math.random() * 0.4 + 0.1;
  }
  for (let i = 0; i < 35; i++) particles.push(new Particle());

  function drawCanvas() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.x += Math.cos(p.angle) * p.speed;
      p.y += Math.sin(p.angle) * p.speed;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(168, 124, 62, ${p.opacity})`; // Gold particles
      ctx.fill();
    });
    requestAnimationFrame(drawCanvas);
  }
  drawCanvas();

  // --- MODAL LOGIC ---
  const modal = document.getElementById('bookingModal');
  const modalBody = document.getElementById('modalBody');
  
  // Store the original form HTML so we can reset it later
  const originalFormHTML = modalBody.innerHTML;

  function openModal(planValue) {
    // Reset modal content back to the form in case it was showing "Success"
    modalBody.innerHTML = originalFormHTML;
    
    // Set the dropdown to match the clicked button
    document.getElementById('readingDropdown').value = planValue;
    
    // Show modal
    modal.classList.add('active');
  }

  function closeModal() {
    modal.classList.remove('active');
  }

  // Close modal when clicking outside the white box
  modal.addEventListener('click', function(e) {
    if (e.target === modal) {
      closeModal();
    }
  });

  // Handle Form Submission
  function handleBooking(event) {
    event.preventDefault(); // Stop page refresh
    
    // Replace form with Success Message
    modalBody.innerHTML = `
      <div class="success-screen">
        <div class="success-icon">✨</div>
        <h2 class="success-title">Session Booked!</h2>
        <p class="success-text">Thank you for trusting VEDA.<br>Your request has been securely received. I will message you on WhatsApp shortly to confirm your reading time and payment details.</p>
        <button class="btn-submit" onclick="closeModal()">Done</button>
      </div>
    `;
  }
</script>
</body>
</html>
